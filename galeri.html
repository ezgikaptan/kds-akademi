<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<script src="assets/js/motion.js"></script>
<script>
function initGallerySlider() {
    var slides = document.querySelectorAll('.gallery-slide');
    var prevBtn = document.querySelector('.gallery-prev-btn');
    var nextBtn = document.querySelector('.gallery-next-btn');
    var titleEl = document.querySelector('.gallery-active-title');
    var descEl = document.querySelector('.gallery-active-desc');
    var progressBar = document.querySelector('.gallery-progress-bar');
    var numbersEl = document.querySelector('.gallery-numbers');
    
    if (!slides.length) return;
    
    var currentIndex = 0;
    var totalSlides = slides.length;
    
    function updateNumbers() {
        numbersEl.innerHTML = '';
        for (var i = 0; i < totalSlides; i++) {
            var numSpan = document.createElement('span');
            numSpan.textContent = (i + 1);
            if (i === currentIndex) {
                numSpan.className = 'text-white text-3xl font-bold leading-none scale-110 transition-all duration-300';
            } else {
                numSpan.className = 'text-white/30 text-sm hover:text-white/60 cursor-pointer transition-all duration-300';
                (function(index) {
                    numSpan.addEventListener('click', function() {
                        goToSlide(index);
                    });
                })(i);
            }
            numbersEl.appendChild(numSpan);
        }
    }
    
    function updateSlider() {
        var isMobile = window.innerWidth < 768;
        var xOffset = isMobile ? 120 : 280;
        var zOffset = -100;
        var scaleFactor = 0.85;
        
        slides.forEach(function(slide, idx) {
            var diff = idx - currentIndex;
            var absDiff = Math.abs(diff);
            
            if (diff === 0) {
                slide.classList.add('active');
                slide.style.transform = 'translate3d(0, 0, 0) scale(1.15)';
                slide.style.opacity = '1';
                slide.style.zIndex = '10';
                slide.style.pointerEvents = 'auto';
                slide.style.filter = 'none';
                
                titleEl.textContent = slide.getAttribute('data-title') || '';
                descEl.textContent = slide.getAttribute('data-desc') || '';
                
                // Reset and rerun the fade-in animation on text change
                titleEl.style.animation = 'none';
                descEl.style.animation = 'none';
                titleEl.offsetHeight; // trigger reflow
                descEl.offsetHeight;
                titleEl.style.animation = 'textFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards';
                descEl.style.animation = 'textFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards';
                
            } else if (diff > 0) {
                slide.classList.remove('active');
                var x = diff * xOffset;
                var z = diff * zOffset;
                var scale = Math.pow(scaleFactor, diff);
                slide.style.transform = 'translate3d(' + x + 'px, 0, ' + z + 'px) scale(' + scale + ')';
                slide.style.opacity = diff === 1 ? '0.6' : (diff === 2 ? '0.2' : '0');
                slide.style.zIndex = (10 - diff) + '';
                slide.style.pointerEvents = diff === 1 ? 'auto' : 'none';
                slide.style.filter = 'blur(2px)';
            } else {
                slide.classList.remove('active');
                var x = diff * xOffset;
                var z = absDiff * zOffset;
                var scale = Math.pow(scaleFactor, absDiff);
                slide.style.transform = 'translate3d(' + x + 'px, 0, ' + z + 'px) scale(' + scale + ')';
                slide.style.opacity = diff === -1 ? '0.6' : (diff === -2 ? '0.2' : '0');
                slide.style.zIndex = (10 - absDiff) + '';
                slide.style.pointerEvents = diff === -1 ? 'auto' : 'none';
                slide.style.filter = 'blur(2px)';
            }
        });
        
        var progressPercent = ((currentIndex + 1) / totalSlides) * 100;
        progressBar.style.width = progressPercent + '%';
        
        updateNumbers();
    }
    
    function goToSlide(index) {
        currentIndex = Math.max(0, Math.min(index, totalSlides - 1));
        updateSlider();
    }
    
    prevBtn.addEventListener('click', function() {
        if (currentIndex > 0) {
            goToSlide(currentIndex - 1);
        } else {
            goToSlide(totalSlides - 1);
        }
    });
    
    nextBtn.addEventListener('click', function() {
        if (currentIndex < totalSlides - 1) {
            goToSlide(currentIndex + 1);
        } else {
            goToSlide(0);
        }
    });
    
    slides.forEach(function(slide) {
        slide.addEventListener('click', function() {
            var index = parseInt(slide.getAttribute('data-index'), 10);
            if (index !== currentIndex) {
                goToSlide(index);
            } else {
                var videoUrl = slide.getAttribute('data-video');
                if (videoUrl) {
                    var videoModal = document.getElementById('video-modal');
                    var videoFrame = document.getElementById('video-modal-frame');
                    if (videoModal && videoFrame) {
                        videoFrame.setAttribute('src', videoUrl);
                        videoModal.classList.remove('hidden');
                        document.body.style.overflow = 'hidden';
                    }
                } else {
                    var imgUrl = slide.querySelector('img').getAttribute('src');
                    var lightbox = document.getElementById('lightbox');
                    var lightboxImg = document.getElementById('lightbox-img');
                    if (lightbox && lightboxImg) {
                        lightboxImg.setAttribute('src', imgUrl);
                        lightbox.classList.remove('hidden');
                        document.body.style.overflow = 'hidden';
                    }
                }
            }
        });
    });
    
    var videoModal = document.getElementById('video-modal');
    var videoFrame = document.getElementById('video-modal-frame');
    var videoClose = document.getElementById('video-modal-close');
    if (videoModal && videoFrame && videoClose) {
        videoClose.addEventListener('click', function() {
            videoFrame.setAttribute('src', '');
            videoModal.classList.add('hidden');
            document.body.style.overflow = '';
        });
    }
    
    var lightbox = document.getElementById('lightbox');
    var lightboxClose = document.getElementById('lightbox-close');
    if (lightbox && lightboxClose) {
        lightboxClose.addEventListener('click', function() {
            lightbox.classList.add('hidden');
            document.body.style.overflow = '';
        });
    }
    
    var startX = 0;
    var endX = 0;
    var threshold = 50;
    
    var container = document.querySelector('.gallery-slider-container');
    if (container) {
        container.addEventListener('touchstart', function(e) {
            startX = e.touches[0].clientX;
        }, { passive: true });
        
        container.addEventListener('touchend', function(e) {
            endX = e.changedTouches[0].clientX;
            var diff = startX - endX;
            if (Math.abs(diff) > threshold) {
                if (diff > 0) {
                    nextBtn.click();
                } else {
                    prevBtn.click();
                }
            }
        }, { passive: true });
    }
    
    window.addEventListener('resize', updateSlider);
    updateSlider();
}

if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initGallerySlider);
} else {
    initGallerySlider();
}
</script>
